<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Support Ticket Update</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f6f9fc; padding: 20px;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 30px; border-radius: 8px;">
        <h2 style="color: #333333;">Support Ticket Updated</h2>
        <p>Your support ticket <strong>#{{ ticket_id }}</strong> has received a new reply.</p>
        <p><strong>Latest Update:</strong></p>
        <div style="border-left: 4px solid #4f46e5; padding-left: 15px; margin: 15px 0; color: #4b5563;">
            <p style="font-style: italic;">"{{ message_preview }}"</p>
            <p style="font-size: 12px; color: #9ca3af;">- replied by {{ author_name }}</p>
        </div>
        <p>To view the full conversation thread or write a reply, please visit the Support page on your account dashboard.</p>
        <br>
        <a href="{{ ticket_url }}" style="background-color: #4f46e5; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px;">View Ticket Thread</a>
    </div>
</body>
</html>
